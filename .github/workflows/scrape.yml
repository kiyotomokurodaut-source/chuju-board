name: 定期スクレイピング(学校情報の自動更新)

on:
  # 自動実行(cron)は費用がかかるため停止中。必要な時だけ手動で「Run workflow」を実行してください。
  # 再開する場合は以下のコメントアウトを外してください:
  # schedule:
  #   # JST 火曜・金曜 6:00(UTC 月曜・木曜 21:00)。50校をBATCH_SIZE=25で2回に分けて巡回 → 週1回全校更新
  #   - cron: "0 21 * * 1,4"
  workflow_dispatch:
    inputs:
      full:
        description: "全校を一括更新する(1で有効)"
        default: "0"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 情報を取得
        run: node scraper/fetch.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BATCH_SIZE: "25"
          FULL: ${{ github.event.inputs.full || '0' }}

      - name: データをコミット
        run: |
          git config user.name "chuju-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "data: 自動更新 $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M')"
          git push
